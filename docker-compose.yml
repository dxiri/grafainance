# Grafainance - Financial Market Intelligence Dashboards
# Docker Compose Configuration
#
# Usage:
#   1. Copy .env.example to .env and fill in your API keys
#   2. Run: docker-compose up -d
#   3. Access Grafana at http://localhost:3000

services:
  # ===================
  # Grafana Dashboard
  # ===================
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: grafainance-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Admin credentials
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      
      # Install Infinity datasource plugin
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      
      # API Keys for datasources (passed as env vars)
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
      - INFLUX_TOKEN=${INFLUXDB_TOKEN}
      - INFLUX_ORG=${INFLUXDB_ORG:-grafainance}
      - INFLUX_BUCKET=${INFLUXDB_BUCKET:-market_sentiment}
      
      # Performance settings
      - GF_SERVER_ENABLE_GZIP=true
      - GF_USERS_ALLOW_SIGN_UP=false
      
      # Logging
      - GF_LOG_LEVEL=info
    volumes:
      # Persistent data only - provisioning files are baked into image
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - grafainance

  # ===================
  # InfluxDB Time-Series Database
  # ===================
  influxdb:
    image: influxdb:2.7
    container_name: grafainance-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-changeme123}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-grafainance}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-market_sentiment}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:?INFLUXDB_TOKEN is required}
      - DOCKER_INFLUXDB_INIT_RETENTION=365d
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - grafainance
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===================
  # Scraper Scheduler (runs immediately, then every 4 hours)
  # ===================
  scraper-cron:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: grafainance-scraper-cron
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Starting scraper scheduler..."
        echo "Running every 4 hours at minute 0"
        while true; do
          echo "[$(date)] Running Fear & Greed scraper..."
          python fear_greed_scraper.py
          echo "[$(date)] Running AECO price scraper..."
          python aeco_scraper.py
          echo "[$(date)] All scrapers complete. Sleeping for 4 hours..."
          sleep 14400
        done
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUXDB_TOKEN:?INFLUXDB_TOKEN is required}
      - INFLUX_ORG=${INFLUXDB_ORG:-grafainance}
      - INFLUX_BUCKET=${INFLUXDB_BUCKET:-market_sentiment}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - grafainance

# ===================
# Volumes
# ===================
volumes:
  grafana_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local

# ===================
# Networks
# ===================
networks:
  grafainance:
    driver: bridge
