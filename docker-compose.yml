# Grafainance - Financial Market Intelligence Dashboards
# Docker Compose Configuration
#
# Usage:
#   1. Copy .env.example to .env and fill in your API keys
#   2. Run: docker-compose up -d
#   3. Access Grafana at http://localhost:3000

services:
  # ===================
  # Grafana Dashboard
  # ===================
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: grafainance-grafana
    restart: unless-stopped
    # No host port needed — NPM reaches Grafana via shared Docker network
    # Uncomment for local debugging only:
    # ports:
    #   - "127.0.0.1:3000:3000"
    environment:
      # Proxy settings (must match your NPM domain)
      - GF_SERVER_ROOT_URL=https://grafainance.appmatrix.cloud
      - GF_SERVER_DOMAIN=grafainance.appmatrix.cloud
      # Admin credentials (all required — no weak defaults)
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:?GF_SECURITY_ADMIN_USER is required}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      
      # Install Infinity datasource plugin
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      
      # InfluxDB connection (no API keys here — they go through api-proxy)
      - INFLUX_TOKEN=${INFLUXDB_TOKEN}
      - INFLUX_ORG=${INFLUXDB_ORG:-grafainance}
      - INFLUX_BUCKET=${INFLUXDB_BUCKET:-market_sentiment}
      
      # Performance settings
      - GF_SERVER_ENABLE_GZIP=true
      
      # Security hardening
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_SECURITY_X_CONTENT_TYPE_OPTIONS=true
      - GF_SECURITY_X_XSS_PROTECTION=true
      - GF_SECURITY_CONTENT_SECURITY_POLICY=true
      - GF_SECURITY_LOGIN_REMEMBER_DAYS=1
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false
      - GF_SECURITY_SECRET_KEY=${GF_SECRET_KEY:-please_change_this_secret_key}
      
      # Logging
      - GF_LOG_LEVEL=info
    volumes:
      # Persistent data only - provisioning files are baked into image
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
      api-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - grafainance
      - reverse-proxy

  # ===================
  # InfluxDB Time-Series Database
  # ===================
  influxdb:
    image: influxdb:2.7
    container_name: grafainance-influxdb
    restart: unless-stopped
    # No external port — only accessible from internal Docker network
    # Uncomment below ONLY for local debugging:
    # ports:
    #   - "127.0.0.1:8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:?INFLUXDB_ADMIN_PASSWORD is required}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-grafainance}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-market_sentiment}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:?INFLUXDB_TOKEN is required}
      - DOCKER_INFLUXDB_INIT_RETENTION=365d
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - grafainance
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===================
  # API Key Proxy (injects keys server-side)
  # ===================
  api-proxy:
    build:
      context: ./api-proxy
      dockerfile: Dockerfile
    container_name: grafainance-api-proxy
    restart: unless-stopped
    # No external port — only reachable from within Docker network
    environment:
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY:?TWELVE_DATA_API_KEY is required}
      - FRED_API_KEY=${FRED_API_KEY:?FRED_API_KEY is required}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - grafainance

  # ===================
  # Scraper Scheduler (runs immediately, then every 4 hours)
  # ===================
  scraper-cron:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: grafainance-scraper-cron
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Starting scraper scheduler..."
        echo "Running every 4 hours at minute 0"
        while true; do
          echo "[$(date)] Running Fear & Greed scraper..."
          python fear_greed_scraper.py
          echo "[$(date)] Running AECO price scraper..."
          python aeco_scraper.py
          echo "[$(date)] Running LNG price scraper (JKM + TTF)..."
          python lng_price_scraper.py
          echo "[$(date)] All scrapers complete. Sleeping for 4 hours..."
          sleep 14400
        done
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUXDB_TOKEN:?INFLUXDB_TOKEN is required}
      - INFLUX_ORG=${INFLUXDB_ORG:-grafainance}
      - INFLUX_BUCKET=${INFLUXDB_BUCKET:-market_sentiment}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - grafainance

# ===================
# Volumes
# ===================
volumes:
  grafana_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local

# ===================
# Networks
# ===================
networks:
  grafainance:
    driver: bridge
  reverse-proxy:
    external: true
